version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: freightshare-db
    environment:
      POSTGRES_DB: freightshare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freightshare"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: freightshare-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: freightshare-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/freightshare
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=428f5efd28e7bb7f9bdfa95c3453a2ef9b1fbf4148b3b64cfc418721c0ad5d45
      - JWT_ALGORITHM=HS256
      - FIREBASE_PROJECT_ID=faraway-f005b
      - LOCAL_DEV_MODE=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: freightshare-worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - .:/code
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/freightshare
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=428f5efd28e7bb7f9bdfa95c3453a2ef9b1fbf4148b3b64cfc418721c0ad5d45
      - JWT_ALGORITHM=HS256
      - FIREBASE_PROJECT_ID=faraway-f005b
      - LOCAL_DEV_MODE=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
